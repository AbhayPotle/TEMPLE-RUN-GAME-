<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Run - Creepy Forest</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- MediaPipe for Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 3D Game Container -->
    <div id="game-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div id="score">Score: 0</div>
        <div id="instructions">Raise Hand: Forward | Swipe L/R: Turn | Swipe Up: Jump</div>
        
        <!-- Webcam feed and hand tracking canvas for user visibility -->
        <div class="webcam-container">
            <video id="input_video" class="input_video" autoplay playsinline></video>
            <canvas id="output_canvas" class="output_canvas" width="320" height="240"></canvas>
        </div>
        
        <div id="start-screen">
            <h1>TEMPLE RUN<br><span style="font-size: 0.5em; color: #ff3333;">CREEPY FOREST</span></h1>
            <p>Show your hand to the camera to start.</p>
            <button id="start-btn">START GAME</button>
        </div>
        
        <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p id="final-score">Score: 0</p>
            <button id="restart-btn">RETRY</button>
        </div>
    </div>

    <!-- Game Logic -->
    <script src="main.js"></script>
</body>
</html>
